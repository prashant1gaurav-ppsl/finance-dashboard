# Example Secrets Configuration
# Copy this to .streamlit/secrets.toml and fill in your actual values
# NEVER commit secrets.toml to git!

[trino]
host = "your-trino-host.com"
port = 443
user = "your-username"
password = "your-password"
catalog = "your-catalog"
schema = "your-schema"

[auth]
admin = "change-this-admin-password"
prashant = "change-this-password"
user1 = "change-this-password"
user2 = "change-this-password"
